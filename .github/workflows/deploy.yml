name: Deploy

on:
  push:
    tags: ['v*']

jobs:
  deploy:
    name: Deploy to api.ccbot.chat
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        run: |
          cd web
          corepack enable
          yarn install --frozen-lockfile
          yarn build:prod

      - name: Package app
        run: |
          tar czf /tmp/deploy.tar.gz \
            --exclude='.venv' --exclude='.git' --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='.env' --exclude='uniapi.db*' --exclude='web/node_modules' \
            --exclude='web/.yarn' --exclude='web/src' --exclude='tests' \
            --exclude='DeepSeek-Reasonix' --exclude='logs' --exclude='backups' \
            --exclude='deploy.sh' --exclude='.user.ini' \
            -C . .

      - name: Upload package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "/tmp/deploy.tar.gz"
          target: "/tmp"
          overwrite: true

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            REMOTE="/www/wwwroot/api.ccbot.chat"
            systemctl stop uniapi-py 2>/dev/null; sleep 1
            tar xzf /tmp/deploy.tar.gz -C "$REMOTE" --overwrite
            echo "VERSION = \"${GITHUB_REF_NAME#v}\"" > "$REMOTE"/app/version.py
            cd "$REMOTE"
            source .venv/bin/activate
            pip install -e . -q 2>&1 | tail -1
            alembic upgrade head 2>&1 | tail -3
            systemctl daemon-reload
            systemctl start uniapi-py
            for i in {1..30}; do
              code="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/health || true)"
              if [ "$code" = "200" ]; then
                echo "Health: 200"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "Health check failed (last code: $code)"
                systemctl status uniapi-py --no-pager || true
                journalctl -u uniapi-py -n 100 --no-pager || true
                exit 1
              fi
              sleep 2
            done
            cat app/version.py
