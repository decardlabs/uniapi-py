name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ tests/

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --no-header --cov=app --cov-report=xml --cov-report=term -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend:
    name: Frontend Tests (TypeScript / React)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd web
          npm install -g yarn
          yarn install --frozen-lockfile

      - name: Type check
        run: |
          cd web
          yarn type-check

      - name: Run unit tests
        run: |
          cd web
          yarn test --run

      - name: Lint
        run: |
          cd web
          yarn lint

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd web
          npm install -g yarn
          yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: |
          cd web
          npx playwright install chromium --with-deps

      - name: Start backend
        run: |
          SQLITE_PATH=/tmp/uniapi_ci.db python -m uvicorn app.main:app --port 8000 &
          sleep 3
          # Seed root user via test fixture
          SQLITE_PATH=/tmp/uniapi_ci.db python3 scripts/seed_ci_db.py
          curl -s http://localhost:8000/api/status

      - name: Start frontend
        run: |
          cd web
          yarn dev > /tmp/vite.log 2>&1 &
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://localhost:3001

      - name: Run E2E tests
        run: |
          cd web
          CI=true BASE_URL=http://localhost:3001 npx playwright test \
            e2e/channel-crud.spec.ts \
            e2e/token-crud.spec.ts \
            e2e/smoke.spec.ts \
            e2e/login.spec.ts \
            e2e/password-change.spec.ts \
            --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
