# 模型提供商配置
# 每家厂商均原生支持 OpenAI + Anthropic 双协议
# Anthropic 端点用于 Claude Code / Anthropic SDK Agent 接入
# OpenAI 端点用于 Cursor / LangChain / CrewAI 等 Agent 接入
#
# Fusion 中转站内部流程使用 OpenAI 格式（Judge/Synthesizer 内部调用）
# 仅在入站/出站边界做轻量格式包装，不做深度协议转换

providers:
  deepseek:
    openai_base_url: "https://api.deepseek.com"
    anthropic_base_url: "https://api.deepseek.com/anthropic"
    api_key: "${DEEPSEEK_API_KEY}"
    models:
      - id: "deepseek-v4-pro"
        name: "DeepSeek V4 Pro"
        max_tokens: 384000
        context_window: 1000000
        cost_per_m_input: 3.00       # ¥/百万 tokens (缓存未命中)
        cost_per_m_output: 6.00
        cost_per_m_cache_hit: 0.025  # ¥/百万 tokens
        capabilities: ["reasoning", "code", "math", "problem-decomposition"]
        # Anthropic 端点自动映射: claude-opus-* → deepseek-v4-pro
      - id: "deepseek-v4-flash"
        name: "DeepSeek V4 Flash"
        max_tokens: 384000
        context_window: 1000000
        cost_per_m_input: 1.00
        cost_per_m_output: 2.00
        cost_per_m_cache_hit: 0.02
        capabilities: ["fast", "general", "code"]
        # Anthropic 端点自动映射: claude-sonnet-* / claude-haiku-* → deepseek-v4-flash

  minimax:
    openai_base_url: "https://api.minimax.io/v1"
    anthropic_base_url: "https://api.minimax.io/anthropic"
    api_key: "${MINIMAX_API_KEY}"
    models:
      - id: "MiniMax-M3"
        name: "MiniMax M3"
        max_tokens: 128000
        context_window: 1000000
        cost_per_m_input: 2.16       # ¥/百万 tokens (5折后)
        cost_per_m_output: 8.64
        capabilities: ["code", "long-context", "multimodal", "swe-bench"]
      - id: "MiniMax-M2.5"
        name: "MiniMax M2.5"
        max_tokens: 128000
        context_window: 204800
        cost_per_m_input: 2.16
        cost_per_m_output: 8.64
        cost_per_m_cache_hit: 0.22
        capabilities: ["code", "bug-detection", "swe-bench"]

  glm:
    openai_base_url: "https://open.bigmodel.cn/api/paas/v4"
    anthropic_base_url: "https://open.bigmodel.cn/api/anthropic"
    api_key: "${GLM_API_KEY}"
    models:
      - id: "glm-5.2"
        name: "GLM 5.2"
        max_tokens: 128000
        context_window: 1000000
        cost_per_m_input: 8.00
        cost_per_m_output: 28.00
        capabilities: ["structured", "multimodal", "1m-context", "mcp-native"]
      - id: "glm-5.1"
        name: "GLM 5.1"
        max_tokens: 128000
        context_window: 200000
        cost_per_m_input: 6.00
        cost_per_m_output: 24.00
        capabilities: ["long-running", "structured", "mcp-native"]
      - id: "glm-4-flash"
        name: "GLM 4 Flash (免费)"
        max_tokens: 4096
        context_window: 128000
        cost_per_m_input: 0.00       # 免费
        cost_per_m_output: 0.00
        capabilities: ["fast", "free-tier"]

  # 可按需扩展的额外提供商（百炼平台一站式 Key 可调多家模型）
  kimi:
    openai_base_url: "https://api.moonshot.cn/v1"
    anthropic_base_url: "https://api.moonshot.cn/anthropic"
    api_key: "${KIMI_API_KEY}"
    models:
      - id: "kimi-k2.6"
        name: "Kimi K2.6"
        max_tokens: 128000
        context_window: 262000
        cost_per_m_input: 6.50
        cost_per_m_output: 27.00
        cost_per_m_cache_hit: 1.10
        capabilities: ["agent-autonomous", "long-coding", "chinese"]
      - id: "kimi-k2.5"
        name: "Kimi K2.5"
        max_tokens: 128000
        context_window: 262000
        cost_per_m_input: 4.00
        cost_per_m_output: 21.00
        cost_per_m_cache_hit: 0.70
        capabilities: ["code", "multimodal", "chinese", "tool-calling"]

  qwen:
    openai_base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    anthropic_base_url: "https://dashscope.aliyuncs.com/apps/anthropic"
    api_key: "${QWEN_API_KEY}"
    models:
      - id: "qwen3.7-max"
        name: "Qwen 3.7 Max"
        max_tokens: 64000
        context_window: 1000000
        cost_per_m_input: 12.00
        cost_per_m_output: 36.00
        capabilities: ["flagship", "multimodal", "structured"]
      - id: "qwen3-coder-plus"
        name: "Qwen 3 Coder Plus"
        max_tokens: 64000
        context_window: 256000
        cost_per_m_input: 7.34
        cost_per_m_output: 36.70
        capabilities: ["code", "programming", "responses-api"]
        # 唯一原生支持 OpenAI Responses API 的国产模型
      - id: "qwen3.6-flash"
        name: "Qwen 3.6 Flash"
        max_tokens: 64000
        context_window: 1000000
        cost_per_m_input: 0.50       # 阶梯最低价
        cost_per_m_output: 2.00
        capabilities: ["fast", "lightweight", "general"]
