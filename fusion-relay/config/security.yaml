# 安全与审计配置
security:
  pii_masking:
    enabled: true
    patterns:
      - type: "phone"
        regex: '1[3-9]\d{9}'
        replacement: "[PHONE]"
      - type: "id_card"
        regex: '\d{17}[\dXx]'
        replacement: "[ID_CARD]"
      - type: "email"
        regex: '[\w.-]+@[\w.-]+\.\w+'
        replacement: "[EMAIL]"
      - type: "api_key"
        regex: 'sk-[a-zA-Z0-9]{40,}'
        replacement: "[API_KEY]"

  prompt_injection_detection:
    enabled: true
    threshold: 0.7

  audit_log:
    enabled: true
    storage: "redis"
    retention_days: 30
    log_requests: true
    log_responses: true
    log_judge_analysis: true

  rate_limiting:
    requests_per_minute: 60
    fusion_requests_per_minute: 20
    cost_budget_daily: 10.0
